name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Kein Abbruch bei erneutem Push: sonst werden lange E2E-Läufe ständig als
# "Cancelled" beendet, obwohl nichts faul ist (z. B. schneller Follow-up-Commit).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (without PWA plugin)
        run: |
          node -e "
            const pkg = require('./package.json');
            delete pkg.dependencies['vite-plugin-pwa'];
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          rm package-lock.json
          npm install --no-audit --no-fund

      - name: Run unit tests
        run: npx vitest run
        env:
          VITE_TESTING_MODE: "true"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: "true"
          VITE_TESTING_MODE: "true"

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (without PWA plugin)
        run: |
          node -e "
            const pkg = require('./package.json');
            delete pkg.dependencies['vite-plugin-pwa'];
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          rm package-lock.json
          npm install --no-audit --no-fund

      - name: Build
        run: npx vite build
        env:
          GITHUB_PAGES: "true"
          VITE_TESTING_MODE: "true"

      - name: Copy index.html to 404.html (SPA routing fallback)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
