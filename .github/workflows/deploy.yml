name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Kein Abbruch bei erneutem Push: sonst werden lange E2E-Läufe ständig als
# "Cancelled" beendet, obwohl nichts faul ist (z. B. schneller Follow-up-Commit).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (ohne PWA)
        run: |
          node -e "
            const pkg = require('./package.json');
            delete pkg.dependencies['vite-plugin-pwa'];
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          rm package-lock.json
          npm install --no-audit --no-fund

      - name: Install vite-plugin-pwa
        run: npm install --no-save vite-plugin-pwa --legacy-peer-deps --no-audit --no-fund

      - name: Build
        run: npx vite build
        env:
          GITHUB_PAGES: "true"
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Copy index.html to 404.html (SPA routing fallback)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
