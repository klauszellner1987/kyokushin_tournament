name: Production Build and Lint

on:
  push:
    branches: [ "main", "feature/production-ready" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'


    - name: Install dependencies
      run: npm ci

    - name: Lint Code
      run: npm run lint

    - name: Run Tests
      run: npm run test -- --run

    - name: Build Application
      run: npm run build
      env:
        # Define empty env vars for build process to succeed if needed
        VITE_FIREBASE_API_KEY: ""
        VITE_FIREBASE_AUTH_DOMAIN: ""
        VITE_FIREBASE_PROJECT_ID: ""
        VITE_FIREBASE_STORAGE_BUCKET: ""
        VITE_FIREBASE_MESSAGING_SENDER_ID: ""
        VITE_FIREBASE_APP_ID: ""

    # Optional: Docker build step to verify Dockerfile is valid
    - name: Build Docker Image
      run: docker build -t kyokushin-tournament:latest .
